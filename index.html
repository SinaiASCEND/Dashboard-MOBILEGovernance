<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#221F72" />
  <title>ASCEND Curriculum Governance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    :root {
      --font-serif: "Source Serif 4", Georgia, serif;
      --font-sans: "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    }
    html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--grey-1); }

    /* Single mount point. On wide screens it holds the desktop dashboard;
       on phones it holds the mobile app (see RootApp in the mount script). */
    #root { min-height: 100vh; }

    /* Mobile host — gives the absolutely-positioned mobile shell a full-screen
       positioned parent to fill. Only used on the phone branch. */
    .m-host { position: relative; width: 100%; height: 100vh; height: 100dvh; background: #F5F6F7; overflow: hidden; }

    /* Phone rendering: let the app own the whole screen and honour safe areas.
       (These rules mirror the originals so the mobile experience is unchanged.) */
    @media (max-width: 820px) {
      html, body { background: #F5F6F7; }
      /* Hide the in-app iOS-style status bar; the real phone has its own. */
      .m-status { display: none !important; }
      /* The page wrapper inside the app uses inset: 44px 0 0 0 to clear that bar — neutralise it. */
      .m-screens-stack { inset: 0 !important; }
      .m-body { padding-top: env(safe-area-inset-top, 0px); }
      .m-nav  { padding-top: env(safe-area-inset-top, 0px); height: calc(50px + env(safe-area-inset-top, 0px)); }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#221F72">
    <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="600" fill="#221F72"></rect>
      <rect x="120" y="150" width="560" height="300" rx="14" fill="#F5F6F7"></rect>
      <rect x="120" y="150" width="120" height="300" rx="14" fill="#ffffff"></rect>
      <rect x="140" y="178" width="80" height="8" rx="4" fill="#221F72"></rect>
      <rect x="140" y="210" width="80" height="6" rx="3" fill="#00AEEF"></rect>
      <rect x="140" y="230" width="80" height="6" rx="3" fill="#cbd5e1"></rect>
      <rect x="140" y="250" width="80" height="6" rx="3" fill="#cbd5e1"></rect>
      <rect x="264" y="178" width="120" height="54" rx="8" fill="#ffffff"></rect>
      <rect x="396" y="178" width="120" height="54" rx="8" fill="#ffffff"></rect>
      <rect x="528" y="178" width="132" height="54" rx="8" fill="#ffffff"></rect>
      <rect x="264" y="180" width="120" height="3" fill="#221F72"></rect>
      <rect x="396" y="180" width="120" height="3" fill="#00AEEF"></rect>
      <rect x="528" y="180" width="132" height="3" fill="#D80B8C"></rect>
      <rect x="264" y="252" width="396" height="180" rx="8" fill="#ffffff"></rect>
      <text x="400" y="510" text-anchor="middle" fill="#ffffff" font-family="serif" font-size="26" font-weight="600">Curriculum Governance</text>
      <text x="400" y="538" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="13" opacity="0.7" letter-spacing="2">ASCEND DASHBOARD</text>
    </svg>
  </template>

  <div id="root"></div>

  <!-- Shared data layer (unchanged) -->
  <script src="eec-data.js"></script>
  <script src="planned-agenda.js"></script>
  <script src="mobile-schedules.js"></script>
  <script src="meeting-details.js"></script>

  <!-- Auto-ingested minutes: generated by tools/ingest-minutes.js, folded in by eec-merge.js.
       No-op until minutes are ingested; safe if data/meetings.generated.js is missing. -->
  <script src="data/meetings.generated.js"></script>
  <script src="eec-merge.js"></script>

  <!-- Mobile app (phones) -->
  <script type="text/babel" src="mobile-sections.jsx"></script>
  <script type="text/babel" src="mobile-app.jsx"></script>

  <!-- Desktop dashboard (wide screens) -->
  <script type="text/babel" src="desktop-app.jsx"></script>

  <!-- Responsive switch: phone layout <= 820px, full desktop dashboard above. -->
  <script type="text/babel" data-presets="env,react">
    function RootApp() {
      const MQ = "(max-width: 820px)";
      const [isMobile, setIsMobile] = React.useState(
        () => (window.matchMedia ? window.matchMedia(MQ).matches : window.innerWidth <= 820)
      );
      React.useEffect(() => {
        if (!window.matchMedia) return;
        const mq = window.matchMedia(MQ);
        const on = (e) => setIsMobile(e.matches);
        mq.addEventListener ? mq.addEventListener("change", on) : mq.addListener(on);
        return () => { mq.removeEventListener ? mq.removeEventListener("change", on) : mq.removeListener(on); };
      }, []);

      if (isMobile) {
        return <div className="m-host"><window.MobileApp /></div>;
      }
      return <window.DesktopApp />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<RootApp />);
  </script>
  <script src="ascend-tagline.js" defer></script>
</body>
</html>
